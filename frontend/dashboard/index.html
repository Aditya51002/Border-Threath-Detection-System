<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Threat Detection System - Dashboard</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-shield-alt"></i>
                Border Threat Detection System
            </span>
            <div class="d-flex align-items-center">
                <span class="badge bg-success me-3" id="system-status">ONLINE</span>
                <span class="text-white-50 me-3" id="current-time"></span>
                <button class="btn btn-sm btn-outline-light" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <!-- Stats Row -->
        <div class="row mb-3">
            <div class="col-md-3">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-0">Total Detections</h6>
                                <h3 class="mb-0" id="total-detections">0</h3>
                            </div>
                            <i class="fas fa-video fa-3x opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-danger text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-0">Critical Alerts</h6>
                                <h3 class="mb-0" id="critical-alerts">0</h3>
                            </div>
                            <i class="fas fa-exclamation-triangle fa-3x opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-0">High Threats</h6>
                                <h3 class="mb-0" id="high-alerts">0</h3>
                            </div>
                            <i class="fas fa-user-secret fa-3x opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-0">Active Cameras</h6>
                                <h3 class="mb-0" id="active-cameras">0</h3>
                            </div>
                            <i class="fas fa-camera fa-3x opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content Row -->
        <div class="row">
            <!-- Left Column - Video Feed -->
            <div class="col-md-8">
                <div class="card mb-3">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-video"></i> Live Video Feed</span>
                        <div>
                            <span class="badge bg-info me-2" id="fps-counter">FPS: 0</span>
                            <span class="badge bg-warning" id="detection-counter">Detections: 0</span>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="video-container" class="position-relative">
                            <img id="video-stream" class="w-100" src="" alt="Video Stream">
                            <div id="no-video" class="text-center p-5 bg-dark text-white">
                                <i class="fas fa-video-slash fa-3x mb-3"></i>
                                <h5>No Video Feed</h5>
                                <p>Start processing to view live feed</p>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="btn-group" role="group">
                            <button class="btn btn-success" onclick="startProcessing()">
                                <i class="fas fa-play"></i> Start
                            </button>
                            <button class="btn btn-danger" onclick="stopProcessing()">
                                <i class="fas fa-stop"></i> Stop
                            </button>
                            <button class="btn btn-primary" onclick="document.getElementById('video-upload').click()">
                                <i class="fas fa-upload"></i> Upload Video
                            </button>
                        </div>
                        <input type="file" id="video-upload" accept="video/*" style="display:none" onchange="uploadVideo(this)">
                    </div>
                </div>

                <!-- Map -->
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <i class="fas fa-map-marker-alt"></i> Threat Location Map
                    </div>
                    <div class="card-body p-0">
                        <div id="map" style="height: 400px;"></div>
                    </div>
                </div>
            </div>

            <!-- Right Column - Alerts & Detections -->
            <div class="col-md-4">
                <!-- Recent Alerts -->
                <div class="card mb-3">
                    <div class="card-header bg-danger text-white">
                        <i class="fas fa-bell"></i> Recent Alerts
                        <span class="badge bg-white text-danger float-end" id="alert-count">0</span>
                    </div>
                    <div class="card-body p-0">
                        <div id="alerts-container" style="max-height: 400px; overflow-y: auto;">
                            <div class="p-3 text-muted text-center">
                                <i class="fas fa-shield-alt fa-2x mb-2"></i>
                                <p class="mb-0">No alerts</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Detections -->
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <i class="fas fa-list"></i> Detection Log
                    </div>
                    <div class="card-body p-0">
                        <div id="detections-container" style="max-height: 400px; overflow-y: auto;">
                            <div class="p-3 text-muted text-center">
                                <i class="fas fa-eye fa-2x mb-2"></i>
                                <p class="mb-0">No detections</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Google Maps (Add your API key) -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
    <!-- Custom JS -->
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
